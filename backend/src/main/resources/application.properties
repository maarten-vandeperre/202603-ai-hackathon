quarkus.http.port=8085
quarkus.http.cors=true
quarkus.http.cors.origins=http://localhost:5173,http://localhost:3000
quarkus.http.cors.methods=GET,POST,OPTIONS
quarkus.http.cors.headers=accept,content-type

# Docling Serve (run via podman-compose)
docling.api.url=http://localhost:5001

# REST Client for Docling
quarkus.rest-client.docling-api.url=${docling.api.url}
quarkus.rest-client.docling-api.connect-timeout=30000
quarkus.rest-client.docling-api.read-timeout=300000
