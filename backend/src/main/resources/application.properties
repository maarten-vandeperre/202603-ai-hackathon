quarkus.http.port=8085
quarkus.http.cors=true

# Use Postgres/Ollama from podman-compose; do not start Dev Services (they require Docker socket)
quarkus.devservices.enabled=false
# Allow frontend from localhost and 127.0.0.1 (Vite default is 5173)
quarkus.http.cors.origins=http://localhost:5173,http://localhost:3000,http://127.0.0.1:5173,http://127.0.0.1:3000
quarkus.http.cors.methods=GET,POST,OPTIONS
quarkus.http.cors.headers=accept,content-type

# Docling Serve (run via podman-compose)
docling.api.url=http://localhost:5001

# REST Client for Docling
quarkus.rest-client.docling-api.url=${docling.api.url}
quarkus.rest-client.docling-api.connect-timeout=30000
quarkus.rest-client.docling-api.read-timeout=300000

# PostgreSQL vector DB (run via podman-compose)
quarkus.datasource.username=app
quarkus.datasource.password=app
quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5432/vectordb
quarkus.datasource.jdbc.max-size=8

# Ollama for embeddings (run via podman-compose; pull model: ollama pull nomic-embed-text)
ollama.api.url=http://localhost:11434
quarkus.rest-client.ollama-api.url=${ollama.api.url}
quarkus.rest-client.ollama-api.connect-timeout=5000
quarkus.rest-client.ollama-api.read-timeout=60000

# RAG chat: use OpenAI-compatible client for LiteLLM (Ollama client calls /api/chat which returns 404 on LiteLLM)
quarkus.langchain4j.ollama.chat-model.enabled=false
quarkus.langchain4j.openai.base-url=https://litellm-prod.apps.maas.redhatworkshops.io/v1
quarkus.langchain4j.openai.api-key=${LANGCHAIN4J_OPENAI_API_KEY:sk-ZhHFO9Pt9FLcnOfU7-9fFQ}
quarkus.langchain4j.openai.chat-model.model-name=qwen3-14b
quarkus.langchain4j.openai.chat-model.temperature=0.2
quarkus.langchain4j.openai.timeout=120s
