# Integration tests use the Podman Compose stack (Postgres, Docling, Ollama) on localhost.
# Start it with: podman-compose up -d  (or ./scripts/compose-up.sh -d)

quarkus.devservices.enabled=false

# Compose: Docling
docling.api.url=http://localhost:5001
quarkus.rest-client.docling-api.url=http://localhost:5001

# Compose: PostgreSQL (pgvector)
quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5432/vectordb
quarkus.datasource.username=app
quarkus.datasource.password=app

# Compose: Ollama (embeddings + RAG)
ollama.api.url=http://localhost:11434
quarkus.rest-client.ollama-api.url=http://localhost:11434
quarkus.langchain4j.ollama.base-url=http://localhost:11434
quarkus.langchain4j.ollama.devservices.enabled=false
